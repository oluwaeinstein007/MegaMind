# MegaMind — full stack
#
# Services:
#   travel-agent   AI travel advisor — answers questions on all social platforms via social-mcp
#   journvibe      Social media manager — creates & publishes travel content
#
# Both services share the same read-only SQLite DB (megamind_data volume).
# Build context is the repository root so the pnpm workspace lockfile is accessible.
#
# Prerequisites:
#   Run the ingestor once to populate the SQLite DB:
#     docker compose -f docker-compose.ingest.yml run --rm ingest
#   For travel-agent's flight/hotel/visa/immigration booking tools, build the
#   sibling TravelAgentMCP repo's mcps/* servers once (or set TVA_MCP_ENABLED=false
#   in travel-agent/.env to run without them):
#     pnpm --dir ../TravelAgentMCP install && pnpm --dir ../TravelAgentMCP run build
#
# Usage:
#   docker compose up -d                  # start both agents
#   docker compose up travel-agent        # travel advisor only
#   docker compose up journvibe           # social media manager only
#   docker compose logs -f travel-agent   # tail travel advisor logs
#   docker compose logs -f journvibe      # tail social manager logs

services:

  # ── Travel Advisor ─────────────────────────────────────────────────────────
  travel-agent:
    build:
      context: .
      dockerfile: travel-agent/Dockerfile
    image: travel-agent:latest
    container_name: travel-agent
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file: ./travel-agent/.env
    ports:
      - "${TRAVEL_WEBHOOK_PORT:-3458}:3456"
    volumes:
      - megamind_data:/data:ro
      - ${TVA_MCP_DIST_PATH:-../TravelAgentMCP/mcps}:/tva-mcp:ro
      - travel-agent-memory:/app/memory

  # ── JournVibe Social Media Manager ────────────────────────────────────────
  journvibe:
    build:
      context: .
      dockerfile: journvibe/Dockerfile
    image: journvibe:latest
    container_name: journvibe
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file: ./journvibe/.env
    ports:
      - "${SOCIAL_WEBHOOK_PORT:-3457}:3456"
    volumes:
      - megamind_data:/data:ro
      - journvibe-memory:/app/memory

volumes:
  megamind_data:
  travel-agent-memory:
  journvibe-memory:
