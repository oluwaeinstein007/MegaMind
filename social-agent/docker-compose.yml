services:
  social-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: nomadsage-social-agent:latest
    container_name: nomadsage-social-agent
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file: .env
    ports:
      - "${WEBHOOK_PORT:-3456}:3456"
    volumes:
      - ${MEGAMIND_DIST_PATH:-../dist}:/data:ro   # MegaMind SQLite DB (read-only)
      - social-agent-memory:/app/memory            # persistent session memory

volumes:
  social-agent-memory:
