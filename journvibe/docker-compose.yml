services:
  journvibe:
    build:
      context: .
      dockerfile: Dockerfile
    image: journvibe:latest
    container_name: journvibe
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file: .env
    ports:
      - "${WEBHOOK_PORT:-3456}:3456"
    volumes:
      - ${MEGAMIND_DIST_PATH:-../dist}:/data:ro   # MegaMind SQLite DB (read-only)
      - journvibe-memory:/app/memory               # persistent session memory

volumes:
  journvibe-memory:
